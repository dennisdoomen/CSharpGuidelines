name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Nuke build
        run: dotnet run --project build/_build.csproj -- Default

  # The Nuke build and Jekyll build are independent:
  # - Nuke compiles the guidelines into standalone HTML documents using Pandoc
  # - Jekyll builds the static website from the same source Markdown files
  # They share no artifacts and can run in parallel.
  jekyll:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
